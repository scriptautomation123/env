# GitHub Pages Jekyll Configuration
# Custom dark-first design with modern layouts
title: Principal Engineer Blog
description: Engineering insights on cloud-native architecture, container orchestration, and AI-driven automation
url: "https://scriptautomation123.github.io"
baseurl: "/env"

# GitHub configuration
repository: scriptautomation123/env
github_username: scriptautomation123

# Permalink style
permalink: pretty

# Collections for blog posts
collections:
  posts:
    output: true
    permalink: /blog/:year/:month/:day/:title/

# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: post
      author: Principal Engineer

# Plugins (GitHub Pages supported)
plugins:
  - jekyll-feed
  - jekyll-seo-tag

# Build settings
markdown: kramdown
highlighter: rouge

kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight

# Social
social:
  github: scriptautomation123
