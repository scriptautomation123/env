###############################################################################
# new-dc.yaml
# OpenShift 4 DeploymentConfig – Spring Boot 3.1+ / JDK 21 / Embedded Tomcat
# NEW TLS configuration using PEM certificates directly (no keystore)
#
# TLS approach  (Spring Boot 3.1+ PEM support):
#   • Spring Boot 3.1 introduced native PEM certificate support via
#     server.ssl.certificate / server.ssl.certificate-private-key.
#   • An OpenShift TLS Secret (type kubernetes.io/tls) provides tls.crt
#     and tls.key directly in PEM format – no PKCS12 conversion needed.
#   • The PEM files are mounted at /etc/tls/private (standard Linux path).
#   • The SSL Bundles API (also 3.1+) is optionally shown via
#     SPRING_SSL_BUNDLE_PEM_* properties for more advanced setups
#     (client certs, hot-reload, etc.).
#
# Advantages over the keystore approach (current-dc.yaml):
#   • No keytool/openssl PKCS12 conversion step.
#   • No keystore password to manage.
#   • Works directly with OpenShift serving-certificate and cert-manager.
#   • Certificate rotation is seamless – just update the Secret; the
#     volume projection refreshes automatically and Spring Boot can
#     detect PEM file changes when using SSL Bundles with reload.
#   • Mount path follows Linux FHS conventions (/etc/tls/private).
#
# Optional: use the OpenShift service serving certificate signer
#   by annotating the matching Service:
#     metadata:
#       annotations:
#         service.beta.openshift.io/serving-cert-secret-name: <APP>-tls
#   OpenShift will auto-create and rotate the TLS Secret.
###############################################################################
apiVersion: apps.openshift.io/v1
kind: DeploymentConfig
metadata:
  name: "${APP}"
  labels:
    app: "${APP}"
    ait: "${AIT}"
spec:
  replicas: "${{REPLICAS}}"
  selector:
    name: ${APP}
  triggers:
    - type: "ConfigChange"
  strategy:
    type: Rolling
  template:
    metadata:
      labels:
        name: ${APP}
        app: "${APP}"
        ait: "${AIT}"
    spec:
      containers:
        - name: "${APP}"
          image: "${REG}/${AIT}/${IMG}:${TAG}"
          ports:
            - containerPort: 8443
              protocol: TCP
              name: https
          env:
            # ── Spring Boot 3.1+ / Embedded Tomcat TLS (PEM) ─────────
            - name: SERVER_PORT
              value: "8443"
            - name: SERVER_SSL_ENABLED
              value: "true"
            # PEM certificate and private key – no keystore, no password
            - name: SERVER_SSL_CERTIFICATE
              value: "file:/etc/tls/private/tls.crt"
            - name: SERVER_SSL_CERTIFICATE_PRIVATE_KEY
              value: "file:/etc/tls/private/tls.key"
            # ── Optional: SSL Bundles API (Spring Boot 3.1+) ─────────
            # Uncomment the block below to use SSL Bundles instead of
            # the flat server.ssl.* properties.  Bundles enable hot-reload
            # and per-bundle trust configuration.
            #
            # - name: SPRING_SSL_BUNDLE_PEM_SERVER_KEYSTORE_CERTIFICATE
            #   value: "file:/etc/tls/private/tls.crt"
            # - name: SPRING_SSL_BUNDLE_PEM_SERVER_KEYSTORE_PRIVATE_KEY
            #   value: "file:/etc/tls/private/tls.key"
            # - name: SPRING_SSL_BUNDLE_PEM_SERVER_RELOAD_ON_UPDATE
            #   value: "true"
            # - name: SERVER_SSL_BUNDLE
            #   value: "server"
            # ── Application ───────────────────────────────────────────
            - name: SERVER_SERVLET_CONTEXT_PATH
              value: "/${CONTEXT_ROOT}"
            - name: SPRING_PROFILES_ACTIVE
              value: "${ZONE}"
            - name: JAVA_TOOL_OPTIONS
              value: >-
                -XX:MaxRAMPercentage=75.0
                -Djava.security.egd=file:/dev/./urandom
          # ── Probes ────────────────────────────────────────────────
          readinessProbe:
            httpGet:
              path: /${CONTEXT_ROOT}/actuator/health/readiness
              port: 8443
              scheme: HTTPS
            initialDelaySeconds: 60
            timeoutSeconds: 1
            periodSeconds: 10
            successThreshold: 1
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /${CONTEXT_ROOT}/actuator/health/liveness
              port: 8443
              scheme: HTTPS
            initialDelaySeconds: 90
            timeoutSeconds: 1
            periodSeconds: 10
            successThreshold: 1
            failureThreshold: 6
          startupProbe:
            httpGet:
              path: /${CONTEXT_ROOT}/actuator/health/liveness
              port: 8443
              scheme: HTTPS
            initialDelaySeconds: 150
            timeoutSeconds: 1
            periodSeconds: 10
            successThreshold: 1
            failureThreshold: 12
          # ── Resources ─────────────────────────────────────────────
          resources:
            requests:
              cpu: "${REQUESTS_CPU}"
              memory: "${REQUESTS_MEM}"
            limits:
              cpu: "${LIMITS_CPU}"
              memory: "${LIMITS_MEM}"
          # ── Volume mounts ─────────────────────────────────────────
          volumeMounts:
            - name: tls-certs
              readOnly: true
              mountPath: /etc/tls/private
          imagePullPolicy: Always
      imagePullSecrets:
        - name: "${IMG_SECRETS_REG}"
      volumes:
        - name: tls-certs
          secret:
            secretName: "${APP}-tls"
            # OpenShift TLS secrets (type kubernetes.io/tls) automatically
            # contain tls.crt and tls.key in PEM format
# ═══════════════════════════════════════════════════════════════════════
# Parameters
# ═══════════════════════════════════════════════════════════════════════
parameters:
  - name: APP
    displayName: "Application Name"
    description: "Unique name to give this instance of the springboot application"
    required: true
  - name: REG
    displayName: "Container Registry"
    description: "Set this to container registry where builds will push images to, and deployments will pull images from"
    required: true
  - name: AIT
    displayName: "AIT Number"
    description: "Set this to AIT where builds will push images to, and deployments will pull images from"
    required: true
  - name: IMG
    displayName: "IMG"
    description: "Image Name"
    required: true
  - name: TAG
    displayName: "Tag"
    description: "Release Tag"
    required: true
  - name: PROJ
    displayName: "Project"
    description: "project"
    required: true
  - name: ZONE
    displayName: "Zone"
    description: "Cluster"
    required: true
  - name: CONTEXT_ROOT
    displayName: "Context Root"
    description: "Legacy Context Root to support apphost endpoints"
    required: true
  - name: REPLICAS
    displayName: "REPLICAS"
    description: "REPLICAS"
    required: true
  - name: REQUESTS_CPU
    displayName: "REQUESTS_CPU"
    description: "REQUESTS_CPU"
    required: true
  - name: REQUESTS_MEM
    displayName: "REQUESTS_MEM"
    description: "REQUESTS_MEM"
    required: true
  - name: LIMITS_CPU
    displayName: "LIMITS_CPU"
    description: "LIMITS_CPU"
    required: true
  - name: LIMITS_MEM
    displayName: "LIMITS_MEM"
    description: "LIMITS_MEM"
    required: true
  - name: IMG_SECRETS_REG
    displayName: "IMG_SECRETS_REG"
    description: "Image pull secret for the container registry"
    required: true
